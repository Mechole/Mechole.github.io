<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>Log-in</title>

    <style>
      html {
        background-color: rgb(181, 240, 240);
        color: rgb(0, 49, 53);
        font-family: "Poppins", sans-serif;
      }

      .login {
        position: relative;
        padding: 3ch;
        border-radius: 5ch;
        margin: 10vh auto;
        width: 50ch;
        height: 70vh;
        text-align: center;
        background-color: rgb(91, 148, 148);
      }

      .login h1 {
        font-size: 50px;
        font-weight: 600;
        margin-bottom: 5vh;
      }

      input {
        padding-left: 4ch;
        background: rgb(169, 224, 219);
        outline: none;
        border-radius: 1ch;
        border-style: none;
        color: rgb(30, 130, 130);
        width: 20ch;
        height: 5vh;
        font-size: 25px;
        text-align: left;
      }

      p {
        font-size: 20px;
        margin-top: 0;
        margin-bottom: 3ch;
      }

      .email-i {
        top: 19.5ch;
        left: 12.6ch;
        position: absolute;
        width: 30px;
      }

      .pass-i {
        top: 31.5ch;
        left: 12.8ch;
        position: absolute;
        width: 25px;
      }

      button {
        margin-top: 5vh;
        background-color: rgb(193, 229, 234);
        border: none;
        border-radius: 5ch;
        width: 150px;
        height: 7vh;
        font-size: 30px;
        font-weight: 700;
        transition: 0.3s;
        color: rgb(0, 49, 53);
      }

      button:hover {
        background-color: rgb(42, 91, 97);
        border: none;
        border-radius: 5ch;
        width: 150px;
        height: 7vh;
        font-size: 30px;
        font-weight: 700;
        color: rgb(148, 217, 227);
      }

      button:active {
        background-color: rgb(42, 91, 97);
        border: 4px solid white;
        border-radius: 5ch;
        width: 150px;
        height: 7vh;
        font-size: 30px;
        font-weight: 700;
        color: rgb(148, 217, 227);
      }
      ::placeholder {
        font-size: 20px;
        color: rgb(26, 92, 85);
      }

      span {
        font-size: 20px;
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="login">
      <h1>LOG IN</h1>
      <div class="valform">
        <form action="">
          <img
            src="https://cdn.iconscout.com/icon/free/png-256/free-user-573-130413.png"
            alt=""
            class="email-i"
          />
          <input id="email-in" type="text" class="email" placeholder="" />
          <p>email</p>

          <img
            src="https://cdn-icons-png.flaticon.com/256/747/747305.png"
            alt=""
            class="pass-i"
          />
          <input id="pass-in" type="password" class="password" placeholder="" />
          <p>password</p>
          <span id="emes" style="color: rgb(26, 92, 85)"></span>
          <button onclick="login()" id="but" type="button">log in</button>
        </form>
      </div>
    </div>

    <script>
      function login() {
        let pass = document.getElementById("pass-in");
        let email = document.getElementById("email-in");

        if (!email.value) {
          email.placeholder = "enter email";
          email.focus();
        } else if (!email.value.includes("@")) {
          email.value = "";
          email.placeholder = "must have @";
          email.focus();
        } else if (pass.value.length == 0) {
          pass.placeholder = "enter password";
          pass.focus();
        } else if (pass.value.length < 8) {
          pass.value = "";
          pass.placeholder = "at least 8 characters";
          pass.focus();
        } else {
          location.replace("calc.html");
          alert("Succesful log-in!");
        }
      }
    </script>
  </body>
</html>
